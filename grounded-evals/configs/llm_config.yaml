# LLM Configuration for grounded-evals
# Uses Amazon Bedrock by default through the boto3 credential chain.
#
# Set AWS credentials with `aws configure`, environment variables, or an IAM role.
#
# Region (optional, defaults to us-east-1):
#   AWS_REGION or AWS_DEFAULT_REGION
#
# Fallback for local dev (no Bedrock):
#   ANTHROPIC_API_KEY           - Direct Anthropic API key

llm:
  provider: bedrock
  region: us-east-1
  model_id: us.anthropic.claude-haiku-4-5-20251001-v1:0
